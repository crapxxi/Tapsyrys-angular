@if (auth.isAuthenticated()) {
  <div class="favorites-page">
    <h1 class="page-title">Избранное</h1>

    @if (error) {
      <p class="error-banner">{{ error }}</p>
    }

    <div class="toolbar">
      <span class="label">Сортировать по</span>
      <select class="select" [(ngModel)]="sortBy">
        <option value="date">Дата добавления</option>
        <option value="price">Цена</option>
      </select>
    </div>

    @if (loading) {
      <p class="loading-text">Загрузка избранного...</p>
    } @else if (!products.length) {
      <p class="empty-text">В избранном пока ничего нет.</p>
    } @else {
      <div class="products-grid">
        @for (p of products; track p.id) {
          <app-product-card [product]="p" />
        }
      </div>
    }
  </div>
} @else {
  <span class="badge-error">Авторизуйтесь для просмотра!</span>
}
