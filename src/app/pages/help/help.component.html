  <div class="topics-grid">
    @for (t of topics; track t.title) {
      <div class="topic-card" (click)= topicClick(t.url)>
        <span class="topic-icon">{{ t.icon }}</span>
        <span class="topic-title">{{ t.title }}</span>
      </div>
    }
  </div>
  <h2 class="section-title">Часто задаваемые вопросы</h2>
  <div class="faq-list">
    @for (faq of faqs; track faq.q; let i = $index) {
      <div class="faq-item">
        <button type="button" class="faq-question" (click)="toggleFaq(i)">
          {{ faq.q }}
          <span class="faq-arrow">{{ faqOpen[i] ? '▲' : '▼' }}</span>
        </button>
        @if (faqOpen[i]) {
          <p class="faq-answer">{{ faq.a }}</p>
        }
      </div>
    }
  </div>
  <div class="contact-section">
    <h2 class="section-title">Связаться с нами</h2>
    <div class="contact-icons">
      <a href="tel:+77073907131" class="contact-icon" title="Телефон">📞</a>
      <a href="https://t.me/tapsyryscom" class="contact-icon" title="Telegram">✈️</a>
      <a href="https://wa.me/+77073907131" class="contact-icon" title="WhatsApp">💬</a>
    </div>
  </div>
</div>
