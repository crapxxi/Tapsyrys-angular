<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Вход</h1>
    <p class="auth-subtitle">Войдите в свой аккаунт</p>

    <div class="user-type-toggle">
      <button 
        type="button" 
        class="toggle-btn" 
        [class.active]="userType === 'shop'"
        (click)="setUserType('shop')"
      >
        Магазин
      </button>
      <button 
        type="button" 
        class="toggle-btn" 
        [class.active]="userType === 'supplier'"
        (click)="setUserType('supplier')"
      >
        Поставщик
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      @if (error) {
        <div class="error-msg">{{ error }}</div>
      }
      <div class="field">
        <label for="phone">Телефон</label>
        <input id="phone" type="tel" formControlName="phone" placeholder="+7 (777) 123-45-67" />
        @if (form.get('phone')?.invalid && form.get('phone')?.touched) {
          <span class="field-error">Введите номер телефона</span>
        }
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" />
        @if (form.get('password')?.invalid && form.get('password')?.touched) {
          <span class="field-error">Минимум 6 символов</span>
        }
      </div>
      <button type="submit" class="btn btn-primary auth-submit" [disabled]="loading">
        {{ loading ? 'Вход...' : 'Войти' }}
      </button>
    </form>

    <p class="auth-footer">
      Нет аккаунта? <a routerLink="/signup">Зарегистрироваться</a>
    </p>
  </div>
</div>
